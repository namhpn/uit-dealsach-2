services:
  # PHP-FPM Service (CodeIgniter 4)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ds_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - app_vendor:/var/www/html/backend/vendor
      - app_writable:/var/www/html/backend/writable
    depends_on:
      - db
    networks:
      - ds_network

  # Frontend Node Service (Vite / npm)
  frontend:
    image: node:20-alpine
    container_name: ds_frontend
    working_dir: /workspace/frontend
    volumes:
      - .:/workspace
    ports:
      - "5173:5173"
    networks:
      - ds_network

  # Nginx Service
  nginx:
    image: nginx:alpine
    container_name: ds_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ds_network

  # MariaDB Service
  db:
    image: mariadb:11.4
    container_name: ds_db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${database_default_database}
      MARIADB_USER: ${database_default_username}
      MARIADB_PASSWORD: ${database_default_password}
      MARIADB_ROOT_PASSWORD: ${database_root_password}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - ds_network

  # phpMyAdmin Service
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: db_pma
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${database_root_password}
    depends_on:
      - db
    networks:
      - ds_network

networks:
  ds_network:
    driver: bridge

volumes:
  db_data:
  app_vendor:
  app_writable:
