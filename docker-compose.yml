services:
  # PHP-FPM Service (CodeIgniter 4)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    environment:
      database.default.hostname: ${DB_HOST:?DB_HOST is required}
      database.default.database: ${DB_DATABASE:?DB_DATABASE is required}
      database.default.username: ${DB_USERNAME:?DB_USERNAME is required}
      database.default.password: ${DB_PASSWORD:?DB_PASSWORD is required}
      database.default.DBDriver: MySQLi
      database.default.port: ${DB_PORT:-3306}
    volumes:
      - .:/var/www/html
      - app_vendor:/var/www/html/backend/vendor
      - app_writable:/var/www/html/backend/writable
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ds_network

  # Frontend Node Service (Vite / npm)
  frontend:
    image: node:20-alpine
    container_name: ds_frontend
    working_dir: /workspace/frontend
    volumes:
      - .:/workspace
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    networks:
      - ds_network

  # Nginx Service
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_started
    networks:
      - ds_network

  # MariaDB Service
  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:?DB_DATABASE is required}
      MARIADB_USER: ${DB_USERNAME:?DB_USERNAME is required}
      MARIADB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mariadb-admin ping -h 127.0.0.1 -u"$${MARIADB_USER}" -p"$${MARIADB_PASSWORD}" --silent',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - ds_network

  # phpMyAdmin Service
  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    environment:
      PMA_HOST: ${DB_HOST:-db}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ds_network

networks:
  ds_network:
    driver: bridge

volumes:
  db_data:
  app_vendor:
  app_writable:
