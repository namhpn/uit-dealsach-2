services:
  # PHP-FPM Service (CodeIgniter 4)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lemp_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - app_vendor:/var/www/html/backend/vendor
      - app_writable:/var/www/html/backend/writable
    env_file:
      - ./backend/.env
    environment:
      CI_ENVIRONMENT: ${CI_ENVIRONMENT:-development}
      database.default.hostname: ${DEALSACH_DB_HOST:-db}
      database.default.database: ${DEALSACH_DB_DATABASE:-ci4_db}
      database.default.username: ${DEALSACH_DB_USERNAME:-ci4_user}
      database.default.password: ${DEALSACH_DB_PASSWORD:-dealsach_dev_password}
      database.default.port: ${DEALSACH_DB_PORT:-3306}
    depends_on:
      - db
    networks:
      - lemp_network

  # Frontend Node Service (Vite / npm)
  frontend:
    image: node:20-alpine
    container_name: dealsach_frontend
    working_dir: /workspace/frontend
    volumes:
      - .:/workspace
    ports:
      - "${VITE_DEV_PORT:-5173}:5173"
    networks:
      - lemp_network

  # Nginx Service
  nginx:
    image: nginx:alpine
    container_name: lemp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - lemp_network

  # MariaDB Service
  db:
    image: mariadb:11.4
    container_name: lemp_db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DEALSACH_DB_DATABASE:-ci4_db}
      MARIADB_USER: ${DEALSACH_DB_USERNAME:-ci4_user}
      MARIADB_PASSWORD: ${DEALSACH_DB_PASSWORD:-dealsach_dev_password}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-dealsach_dev_root_password}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - lemp_network

  # phpMyAdmin Service
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: lemp_pma
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-dealsach_dev_root_password}
    depends_on:
      - db
    networks:
      - lemp_network

networks:
  lemp_network:
    driver: bridge

volumes:
  db_data:
  app_vendor:
  app_writable:
